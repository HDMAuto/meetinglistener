<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E88E5"/>
      <stop offset="1" stop-color="#2BD9BD"/>
    </linearGradient>
  </defs>

  <!-- macOS-style icon: white rounded tile, 824px centered in a 1024 canvas -->
  <rect x="100" y="100" width="824" height="824" rx="184" fill="#FFFFFF"/>

  <g transform="translate(512 512) scale(0.78) translate(-512 -404)">
    <!-- headband arc over the top -->
    <path d="M 179.4 399.3 A 340 340 0 0 1 844.6 399.3"
          fill="none" stroke="url(#g)" stroke-width="46" stroke-linecap="round"/>

    <!-- earcups -->
    <rect x="140" y="390" width="95" height="160" rx="40" fill="#1E88E5"/>
    <rect x="789" y="390" width="95" height="160" rx="40" fill="#2BD9BD"/>

    <!-- speech-bubble tail (draw first so the ring overlaps its base) -->
    <polygon points="303.6,567.2 380.1,658.4 266.8,690.8" fill="#1E88E5"/>

    <!-- speech bubble ring -->
    <circle cx="512" cy="470" r="210" fill="none" stroke="url(#g)" stroke-width="42"/>

    <!-- waveform bars -->
    <g fill="url(#g)">
      <rect x="358" y="452" width="20" height="36" rx="10"/>
      <rect x="394" y="435" width="20" height="70" rx="10"/>
      <rect x="430" y="410" width="20" height="120" rx="10"/>
      <rect x="466" y="380" width="20" height="180" rx="10"/>
      <rect x="502" y="355" width="20" height="230" rx="10"/>
      <rect x="538" y="380" width="20" height="180" rx="10"/>
      <rect x="574" y="410" width="20" height="120" rx="10"/>
      <rect x="610" y="435" width="20" height="70" rx="10"/>
      <rect x="646" y="452" width="20" height="36" rx="10"/>
    </g>
  </g>
</svg>
